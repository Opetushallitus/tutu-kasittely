version = 3.10.7
runner.dialect = scala3
docstrings.style = Asterisk
docstrings.wrap = false
maxColumn = 120
align.preset = more
indent.defnSite = 2
assumeStandardLibraryStripMargin = true
rewrite.rules = [AvoidInfix, Imports, RedundantParens, SortModifiers, RemoveSemicolons]
rewrite.imports.sort = ascii
